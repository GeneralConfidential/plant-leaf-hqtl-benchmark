name: CI

on:
  push:
    branches: [main, clean-main]
  pull_request:
    branches: [main, clean-main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: code/requirements-ci.txt

      - name: Install dependencies
        run: pip install -r code/requirements-ci.txt

      - name: CPU smoke test
        run: python code/run_smoke_test.py

      - name: Verify artifact manifest
        run: |
          python code/check_artifacts.py
